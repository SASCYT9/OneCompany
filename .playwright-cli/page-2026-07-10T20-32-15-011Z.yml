                  - paragraph [ref=e75]:
                    - strong [ref=e76]: IN STOCK AND READY TO SHIP!
                  - paragraph [ref=e77]: From the combination of Akrapovič's manufacturing expertise and the passion of the Ducati technicians comes the complete racing exhaust system made entirely from titanium. In addition to ensuring resistance to high temperatures, the system complies with the required noise limit on the track with an exhaust sound level of less than 105 dB with the dB killers installed, however, removing the dB killers will unleash an even louder roar at 105dB. The special titanium alloy further lightens the bike, significantly improving the power-to-weight ratio for consistently excellent performance on the circuit. It is equipped with a racing-derived polyester air filter that, besides being more permeable, guarantees excellent filtering power and easy maintenance. It also features an innovative canister assembly which recovers the fuel that escapes during aggressive braking and returns it to the tank, contributing to consistent top performance. The map provided, with which all DTC - DWC - DPL and DSC parameters are adapted to the bike new performance, and the careful work carried out on torque and power have led to improvements over the entire range of use of the Panigale V4. Aesthetically, the dual under-seat silencer makes the bike design even more unique, giving it an additional aggressive touch with its unmistakable sound.
                  - paragraph [ref=e78]: This product is intended for racing vehicle use only, in closed course competition. Operation on public roads is prohibited by law (check local regulations).
                  - paragraph [ref=e79]: To be used exclusively in the single-seater configuration and is NOT compatible with cruise control!
                  - paragraph [ref=e80]: The lower race fairing (SKU 97181321AA) is also required for install. Sold separately.
