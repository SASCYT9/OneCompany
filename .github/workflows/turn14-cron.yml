name: Daily Turn14 Sync

on:
  schedule:
    # Runs at 03:00 UTC every Monday
    - cron: "0 3 * * 1"
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Turn14 Sync Script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          TURN14_CLIENT_ID: ${{ secrets.TURN14_CLIENT_ID }}
          TURN14_CLIENT_SECRET: ${{ secrets.TURN14_CLIENT_SECRET }}
        run: npx tsx scripts/turn14-cron.ts
