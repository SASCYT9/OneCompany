# Stale bot — gently nudges abandoned issues and PRs.
# Reference: https://github.com/actions/stale

name: Stale issues and PRs

on:
  schedule:
    - cron: "0 7 * * *" # Daily 07:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # Issues — generous: triage takes time
          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-issue-label: "stale"
          exempt-issue-labels: "pinned,security,roadmap,bug,help wanted"
          stale-issue-message: |
            This issue has been automatically marked as stale because it has not had
            recent activity. It will be closed in 14 days if no further activity
            occurs. If this is still relevant, please leave a comment.
          close-issue-message: |
            Closing as stale. Feel free to reopen with new context.

          # PRs — tighter: reviews shouldn't pile up
          days-before-pr-stale: 30
          days-before-pr-close: 7
          stale-pr-label: "stale"
          exempt-pr-labels: "pinned,security,wip,blocked,dependencies"
          stale-pr-message: |
            This PR has been inactive for 30 days. If still relevant, rebase on
            `master` and request review. Otherwise it will be closed in 7 days.
          close-pr-message: |
            Closing as stale. Reopen any time once ready to continue.

          # Be polite
          remove-stale-when-updated: true
          operations-per-run: 100
          ascending: true
