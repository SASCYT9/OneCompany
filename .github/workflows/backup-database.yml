# PostgreSQL backup of the production Prisma Cloud database.
#
# Runs daily at 03:00 UTC, or manually (Actions → Backup database → Run workflow).
#
# Required secret:
#   DATABASE_URL — full Postgres connection string with read access.
#   Set under: Settings → Secrets and variables → Actions → New repository secret.
#
# Output:
#   - Compressed (-Z9) custom-format dump uploaded as a workflow artifact.
#   - Retained for 30 days.
#   - For longer retention, add a step that uploads to S3, Cloudflare R2,
#     or Backblaze B2 with their dedicated GitHub Action and secrets.
#
# Notes:
#   - Postgres 16 client matches the server version.
#   - --no-owner --no-acl keeps the dump portable across DB instances.
#   - Custom format (-F c) is smaller and supports parallel restore via
#     pg_restore -j N.

name: Backup database

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Guard — DATABASE_URL secret must be set
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error title=Missing secret::Add DATABASE_URL under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Install PostgreSQL 16 client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends postgresql-client-16

      - name: Create compressed custom-format dump
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          mkdir -p backups
          stamp=$(date -u +%Y%m%d-%H%M%S)
          out="backups/onecompany-${stamp}.dump"
          pg_dump "$DATABASE_URL" \
            --no-owner --no-acl \
            --format=custom \
            --compress=9 \
            --verbose \
            --file="$out"
          ls -lh "$out"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: postgres-backup-${{ github.run_number }}
          path: backups/
          retention-days: 30
          if-no-files-found: error
          compression-level: 0 # Already compressed by pg_dump
